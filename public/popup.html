<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>cgpt-virtualizer</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        min-width: 220px;
        padding: 16px;
      }

      main {
        display: grid;
        gap: 12px;
      }

      label {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="toggle">
        <input id="toggle" type="checkbox" disabled />
        <span>On / Off</span>
      </label>
      <p id="status-line" aria-live="polite">Off</p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
